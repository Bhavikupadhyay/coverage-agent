# CoverageAgent — local development & single-host deployment.
#
# Two services:
#   - coverage-agent           runs the FastAPI app + UI (live mode)
#   - coverage-agent-offline   same image, but OFFLINE_MODE=true so you can
#                              click through the UI without provisioning keys.
#
# Pick one or run both with:  docker compose up coverage-agent
# Or:                          docker compose up coverage-agent-offline

services:
  coverage-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: coverage-agent:latest
    container_name: coverage-agent
    ports:
      - "8000:8000"
    environment:
      OFFLINE_MODE: "${OFFLINE_MODE:-false}"
      EVAL_STRICTNESS: "${EVAL_STRICTNESS:-balanced}"
      # Demo path (server-provided keys). Leave blank to disable demo mode.
      DEMO_GROQ_API_KEY: "${DEMO_GROQ_API_KEY:-}"
      DEMO_E2B_API_KEY: "${DEMO_E2B_API_KEY:-}"
      DEMO_BRAINTRUST_API_KEY: "${DEMO_BRAINTRUST_API_KEY:-}"
      DEMO_MODEL: "${DEMO_MODEL:-}"
      # CLI / BYOK fallback path.
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      E2B_API_KEY: "${E2B_API_KEY:-}"
      BRAINTRUST_API_KEY: "${BRAINTRUST_API_KEY:-}"
    volumes:
      # Persist SQLite run history across container restarts.
      - ./.local:/app/.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  coverage-agent-offline:
    build:
      context: .
      dockerfile: Dockerfile
    image: coverage-agent:latest
    container_name: coverage-agent-offline
    ports:
      - "8001:8000"
    environment:
      OFFLINE_MODE: "true"
    volumes:
      - ./.local:/app/.local
    profiles: ["offline"]
