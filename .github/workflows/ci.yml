name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q

      - name: Run acceptance harness (mock-LLM)
        run: uv run python benchmarks/run_acceptance.py --mock-llm

      - name: Mock ci-run end-to-end reporting check
        run: uv run pytest tests/test_ci_run_e2e.py -q
